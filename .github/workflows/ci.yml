name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -count=1 ./...

      # We rebuild for the *other* OS too so a Linux-only or macOS-only file
      # tag breakage shows up immediately, even when only one runner is hot.
      - name: cross-compile (linux from macos / macos from linux)
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            GOOS=linux go build ./...
          else
            GOOS=darwin go build ./...
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0
          args: --timeout=5m
